{% extends "layouts/base.html" %}

{% block breadcrumbs %}
<span class="breadcrumb-item">HOME</span>
<span class="breadcrumb-item">EXECUTIONS</span>
{% endblock %}

{% block content %}
<div class="panel">
    <div class="panel-header">
        PROCEDURE EXECUTIONS
        <a href="/executions/new" class="btn btn-primary" style="float: right;">+ START EXECUTION</a>
    </div>
    <div class="panel-body">
        <div style="display: flex; gap: var(--space-md); margin-bottom: var(--space-md);">
            <select id="procedure-filter"
                    name="procedure_id"
                    class="form-select"
                    style="width: 200px;"
                    hx-get="/executions/table"
                    hx-trigger="change"
                    hx-target="#executions-table-body"
                    hx-include="#status-filter">
                <option value="">All Procedures</option>
                {% for p in procedures %}
                <option value="{{ p.id }}">{{ p.name }}</option>
                {% endfor %}
            </select>
            <select id="status-filter"
                    name="status"
                    class="form-select"
                    style="width: 150px;"
                    hx-get="/executions/table"
                    hx-trigger="change"
                    hx-target="#executions-table-body"
                    hx-include="#procedure-filter">
                <option value="">All Statuses</option>
                {% for s in statuses %}
                <option value="{{ s }}">{{ s | upper | replace('_', ' ') }}</option>
                {% endfor %}
            </select>
        </div>
        <table class="data-table">
            <thead>
                <tr>
                    <th style="width: 60px;">ID</th>
                    <th>PROCEDURE</th>
                    <th style="width: 80px;">VERSION</th>
                    <th style="width: 120px;">WORK ORDER</th>
                    <th style="width: 100px;">STATUS</th>
                    <th style="width: 100px;">PROGRESS</th>
                    <th style="width: 170px;">STARTED</th>
                </tr>
            </thead>
            <tbody id="executions-table-body"
                   hx-get="/executions/table"
                   hx-trigger="load"
                   hx-swap="innerHTML">
                <tr>
                    <td colspan="7" class="text-muted" style="text-align: center;">Loading...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
