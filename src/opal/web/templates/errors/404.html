<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Not Found - OPAL</title>
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
    <div style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
        <div class="panel" style="max-width: 400px; text-align: center;">
            <div class="panel-header">404 - NOT FOUND</div>
            <div class="panel-body">
                <p class="text-muted" style="font-size: 3em; margin-bottom: var(--space-md);">[ ? ]</p>
                <p>{{ message }}</p>
                <a href="/" class="btn btn-primary" style="margin-top: var(--space-md);">GO HOME</a>
            </div>
        </div>
    </div>
</body>
</html>
