{% extends "layouts/base.html" %}

{% block breadcrumbs %}
<span class="breadcrumb-item">HOME</span>
<span class="breadcrumb-item">PURCHASES</span>
{% endblock %}

{% block content %}
<div class="panel">
    <div class="panel-header">
        PURCHASE ORDERS
        <a href="/purchases/new" class="btn btn-primary" style="float: right;">+ NEW PO</a>
    </div>
    <div class="panel-body">
        <div class="toolbar" style="margin-bottom: var(--space-md); display: flex; gap: var(--space-md);">
            <select id="status-filter"
                    name="status"
                    class="form-select"
                    style="max-width: 200px;"
                    hx-get="/purchases/table"
                    hx-trigger="change"
                    hx-target="#purchases-table-body">
                <option value="">All statuses</option>
                {% for s in statuses %}
                <option value="{{ s }}">{{ s | upper }}</option>
                {% endfor %}
            </select>
        </div>
        <table class="data-table">
            <thead>
                <tr>
                    <th style="width: 100px;">REFERENCE</th>
                    <th>SUPPLIER</th>
                    <th style="width: 100px;">STATUS</th>
                    <th style="width: 100px;">TARGET</th>
                    <th style="width: 60px;">LINES</th>
                    <th style="width: 160px;">CREATED</th>
                </tr>
            </thead>
            <tbody id="purchases-table-body" hx-get="/purchases/table" hx-trigger="load">
                <tr>
                    <td colspan="6" class="text-muted">Loading...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
