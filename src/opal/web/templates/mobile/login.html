<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - OPAL Mobile</title>
    <script>
        (function() {
            var theme = localStorage.getItem('opal_theme') || 'dark';
            if (theme === 'light') document.documentElement.setAttribute('data-theme', 'light');
        })();
    </script>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/css/mobile.css">
</head>
<body class="m-body" style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
    <div class="m-login-container">
        <div class="m-login-brand">
            <div class="m-login-brand-text">OPAL</div>
            <div class="m-login-brand-sub">Operations, Procedures, Assets, Logistics</div>
        </div>

        <div class="panel">
            <div class="panel-header">Select User</div>
            <div class="panel-body">
                {% if users %}
                <form method="POST" action="/login" id="login-form">
                    <input type="hidden" name="redirect" value="/m/">
                    <div class="form-group">
                        <label class="form-label" for="user_id">User</label>
                        <select name="user_id" id="user_id" class="form-select" required>
                            {% for user in users %}
                            <option value="{{ user.id }}">{{ user.name }}{% if user.is_admin %} [ADMIN]{% endif %}{% if user.email %} ({{ user.email }}){% endif %}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">LOG IN</button>
                </form>
                {% else %}
                <div class="panel-body" style="color: var(--text-muted); font-family: var(--font-mono); font-size: 0.8rem;">No users found. Create one below.</div>
                {% endif %}
            </div>
        </div>

        <div class="m-login-divider">or</div>

        <div class="panel">
            <div class="panel-header">Create New User</div>
            <div class="panel-body">
                <form method="POST" action="/login/new-user" id="new-user-form">
                    <input type="hidden" name="redirect" value="/m/">
                    <div class="form-group">
                        <label class="form-label" for="name">Name *</label>
                        <input type="text" name="name" id="name" class="form-input" required placeholder="Full Name" autocomplete="name">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="email">Email</label>
                        <input type="email" name="email" id="email" class="form-input" placeholder="Optional" autocomplete="email">
                    </div>
                    <button type="submit" class="btn btn-primary">CREATE NEW USER</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
