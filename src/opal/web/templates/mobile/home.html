{% extends "layouts/mobile.html" %}

{% block head %}
<script src="/static/js/html5-qrcode.min.js"></script>
{% endblock %}

{% block content %}
<div class="panel">
    <div class="panel-header">SCANNER</div>
    <div style="padding: 0;">
        <div id="scanner" class="scanner-viewport scanner-inactive">
            <span>TAP START TO SCAN</span>
        </div>
    </div>
</div>

<button id="scan-toggle" class="btn btn-primary btn-full" onclick="toggleScanner()" style="margin-bottom: var(--space-sm);">START SCANNER</button>

<div class="panel">
    <div class="panel-header">MANUAL LOOKUP</div>
    <div class="panel-body">
        <div class="search-row">
            <input type="text" id="manual-code" class="form-input" placeholder="OPAL:I:KST-F-0002/001" autocapitalize="off" autocorrect="off">
            <button class="btn btn-primary" onclick="lookupManual()">GO</button>
        </div>
    </div>
</div>

<div class="panel">
    <div class="panel-header">RECENT SCANS</div>
    <div id="recent-scans-list">
        <div class="panel-body" style="color: var(--text-muted); font-family: var(--font-mono); font-size: 0.8rem;">No recent scans</div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    var html5QrCode = null;
    var scannerRunning = false;

    function toggleScanner() {
        scannerRunning ? stopScanner() : startScanner();
    }

    function startScanner() {
        var el = document.getElementById('scanner');
        el.classList.remove('scanner-inactive');
        el.innerHTML = '';

        html5QrCode = new Html5Qrcode('scanner');
        html5QrCode.start(
            { facingMode: 'environment' },
            { fps: 10, qrbox: function(w, h) { var s = Math.min(w, h) * 0.7; return { width: s, height: s }; }, aspectRatio: 1.0 },
            function(code) { onScanSuccess(code); },
            function() {}
        ).then(function() {
            scannerRunning = true;
            document.getElementById('scan-toggle').textContent = 'STOP SCANNER';
        }).catch(function(err) {
            el.classList.add('scanner-inactive');
            el.innerHTML = '<span>CAMERA ERROR: ' + err + '</span>';
        });
    }

    function stopScanner() {
        if (html5QrCode && scannerRunning) {
            html5QrCode.stop().then(function() {
                scannerRunning = false;
                html5QrCode = null;
                var el = document.getElementById('scanner');
                el.classList.add('scanner-inactive');
                el.innerHTML = '<span>TAP START TO SCAN</span>';
                document.getElementById('scan-toggle').textContent = 'START SCANNER';
            }).catch(function() { scannerRunning = false; html5QrCode = null; });
        }
    }

    function onScanSuccess(code) {
        if (html5QrCode && scannerRunning) {
            html5QrCode.stop().catch(function() {});
            scannerRunning = false;
            html5QrCode = null;
        }
        addRecentScan(code);
        window.location.href = '/m/scan?code=' + encodeURIComponent(code);
    }

    function lookupManual() {
        var code = document.getElementById('manual-code').value.trim();
        if (!code) return;
        addRecentScan(code);
        window.location.href = '/m/scan?code=' + encodeURIComponent(code);
    }

    document.getElementById('manual-code').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { e.preventDefault(); lookupManual(); }
    });

    function getRecentScans() {
        try { return JSON.parse(localStorage.getItem('opal_recent_scans') || '[]'); } catch(e) { return []; }
    }

    function addRecentScan(code) {
        var scans = getRecentScans().filter(function(s) { return s.code !== code; });
        scans.unshift({ code: code, time: new Date().toISOString() });
        if (scans.length > 10) scans = scans.slice(0, 10);
        localStorage.setItem('opal_recent_scans', JSON.stringify(scans));
    }

    function renderRecentScans() {
        var scans = getRecentScans();
        var el = document.getElementById('recent-scans-list');
        if (scans.length === 0) {
            el.innerHTML = '<div class="panel-body" style="color: var(--text-muted); font-family: var(--font-mono); font-size: 0.8rem;">No recent scans</div>';
            return;
        }
        var html = '';
        for (var i = 0; i < scans.length; i++) {
            var s = scans[i];
            var t = s.time.replace('T', ' ').substring(0, 19) + 'Z';
            html += '<a class="recent-item" href="/m/scan?code=' + encodeURIComponent(s.code) + '">';
            html += '<span class="mono" style="font-size: 0.8rem;">' + escapeHtml(s.code) + '</span>';
            html += '<span class="mono" style="font-size: 0.65rem; color: var(--text-muted);">' + t + '</span>';
            html += '</a>';
        }
        el.innerHTML = html;
    }

    function escapeHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    renderRecentScans();
</script>
{% endblock %}
