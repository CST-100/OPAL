{% extends "layouts/mobile.html" %}

{% block head %}
<script src="/static/js/html5-qrcode.min.js"></script>
{% endblock %}

{% block content %}
<div class="panel">
    <div class="panel-header">Inventory Search</div>
    <div class="panel-body">
        <div class="search-row">
            <input type="text" id="inv-search" class="form-input" placeholder="Search parts, OPAL numbers..." autocapitalize="off" autocorrect="off">
            <button class="btn btn-primary" onclick="searchInventory()">GO</button>
        </div>
        <a href="/m/" class="btn btn-sm">SCAN TO LOOK UP</a>
    </div>
</div>

<div id="search-results">
    <div class="panel-body" style="color: var(--text-muted); font-family: var(--font-mono); font-size: 0.8rem;">Enter a search term or scan a code</div>
</div>

<div class="m-panel">
    <div class="panel-header">Quick Transfer</div>
    <div class="panel-body">
        <div id="transfer-step-1" class="transfer-step active">
            <div class="form-group">
                <label class="form-label">Step 1: Select item to transfer</label>
                <div class="search-row">
                    <input type="text" id="transfer-item-search" class="form-input" placeholder="Search or enter OPAL number" autocapitalize="off">
                    <button class="btn" onclick="searchTransferItem()">FIND</button>
                </div>
                <button class="btn btn-primary btn-sm" onclick="openTransferScanner()">SCAN ITEM</button>
            </div>
            <div id="transfer-item-results" class="m-mt-sm"></div>
            <div id="transfer-scanner-container" class="scanner-inline hidden">
                <div id="transfer-scanner-view" class="scanner-viewport" style="max-height: 30vh;"></div>
                <button class="btn btn-sm" onclick="closeTransferScanner()">CLOSE SCANNER</button>
            </div>
        </div>

        <div id="transfer-step-2" class="m-transfer-step">
            <div class="m-panel" style="border-color: var(--accent-blue);">
                <div class="panel-body">
                    <div class="data-row">
                        <span class="data-label">Item</span>
                        <span class="data-value" id="transfer-item-name">--</span>
                    </div>
                    <div class="data-row">
                        <span class="data-label">OPAL #</span>
                        <span class="data-value" id="transfer-item-opal">--</span>
                    </div>
                    <div class="data-row">
                        <span class="data-label">Current Qty</span>
                        <span class="data-value" id="transfer-item-qty">--</span>
                    </div>
                    <div class="data-row">
                        <span class="data-label">Current Loc</span>
                        <span class="data-value" id="transfer-item-loc">--</span>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Quantity to transfer</label>
                <input type="number" id="transfer-qty" class="form-input" min="0.01" step="any" placeholder="Quantity">
            </div>
            <div class="form-group">
                <label class="form-label">Step 2: Target location</label>
                <input type="text" id="transfer-location" class="form-input" placeholder="Enter location code" autocapitalize="off">
                <button class="btn btn-primary btn-sm" onclick="openLocationScanner()">SCAN LOCATION</button>
            </div>
            <div id="location-scanner-container" class="scanner-inline hidden">
                <div id="location-scanner-view" class="scanner-viewport" style="max-height: 30vh;"></div>
                <button class="btn btn-sm" onclick="closeLocationScanner()">CLOSE SCANNER</button>
            </div>

            <div class="btn-row">
                <button class="btn" onclick="resetTransfer()">BACK</button>
                <button class="btn btn-primary" onclick="confirmTransfer()">CONFIRM TRANSFER</button>
            </div>
        </div>

        <div id="transfer-step-3" class="m-transfer-step">
            <div class="m-text-center">
                <div class="m-text-green mono" style="font-size: 1.2rem; font-weight: 700;">TRANSFER COMPLETE</div>
                <div class="m-text-muted mono" id="transfer-summary" style="font-size: 0.8rem;"></div>
            </div>
            <button class="btn btn-primary" onclick="resetTransfer()">NEW TRANSFER</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    var selectedTransferItem = null;
    var transferScanner = null;
    var locationScanner = null;

    // ── Inventory search ──

    document.getElementById('inv-search').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            searchInventory();
        }
    });

    function searchInventory() {
        var query = document.getElementById('inv-search').value.trim();
        if (!query) return;

        var container = document.getElementById('search-results');
        container.innerHTML = '<div class="panel-body" style="color: var(--text-muted); font-family: var(--font-mono); font-size: 0.8rem;">Searching...</div>';

        fetch('/api/inventory?page=1&page_size=20', {
            headers: getHeaders()
        }).then(function(resp) {
            if (!resp.ok) throw new Error('API error');
            return resp.json();
        }).then(function(data) {
            var items = data.items || [];
            // Client-side filter by query
            var q = query.toLowerCase();
            var filtered = items.filter(function(item) {
                return (item.part_name && item.part_name.toLowerCase().indexOf(q) !== -1) ||
                       (item.opal_number && item.opal_number.toLowerCase().indexOf(q) !== -1) ||
                       (item.location && item.location.toLowerCase().indexOf(q) !== -1) ||
                       (item.lot_number && item.lot_number.toLowerCase().indexOf(q) !== -1) ||
                       (item.part_external_pn && item.part_external_pn.toLowerCase().indexOf(q) !== -1);
            });

            if (filtered.length === 0) {
                container.innerHTML = '<div class="panel-body" style="color: var(--text-muted); font-family: var(--font-mono); font-size: 0.8rem;">No results for "' + escapeHtml(query) + '"</div>';
                return;
            }

            var html = '<div class="panel"><div class="panel-header">Results (' + filtered.length + ')</div>';
            for (var i = 0; i < filtered.length; i++) {
                var item = filtered[i];
                html += '<div class="m-list-item" onclick="showInvDetail(' + item.id + ')" data-inv-id="' + item.id + '">';
                html += '<span class="m-list-title">' + escapeHtml(item.part_name) + '</span>';
                html += '<div class="m-list-meta">';
                html += '<span class="mono" style="font-size: 0.75rem; color: var(--text-secondary);">' + escapeHtml(item.opal_number || '--') + '</span>';
                html += '<span class="mono" style="font-size: 0.75rem;">Qty: ' + item.quantity + '</span>';
                html += '<span class="mono" style="font-size: 0.75rem; color: var(--text-muted);">' + escapeHtml(item.location) + '</span>';
                html += '</div>';
                html += '</div>';
                html += '<div class="m-expandable-content" id="inv-detail-' + item.id + '">';
                html += '<div class="data-row"><span class="data-label">OPAL #</span><span class="data-value">' + escapeHtml(item.opal_number || '--') + '</span></div>';
                html += '<div class="data-row"><span class="data-label">Quantity</span><span class="data-value">' + item.quantity + '</span></div>';
                html += '<div class="data-row"><span class="data-label">Location</span><span class="data-value">' + escapeHtml(item.location) + '</span></div>';
                if (item.lot_number) {
                    html += '<div class="data-row"><span class="data-label">Lot</span><span class="data-value">' + escapeHtml(item.lot_number) + '</span></div>';
                }
                if (item.part_external_pn) {
                    html += '<div class="data-row"><span class="data-label">Ext PN</span><span class="data-value">' + escapeHtml(item.part_external_pn) + '</span></div>';
                }
                html += '<div class="btn-row">';
                html += '<button class="btn btn-primary btn-sm" onclick="selectForTransfer(' + JSON.stringify(item).replace(/"/g, '&quot;') + '); event.stopPropagation();">TRANSFER</button>';
                html += '<a href="/m/scan?code=OPAL:I:' + encodeURIComponent(item.opal_number || '') + '" class="btn btn-sm" onclick="event.stopPropagation();">DETAILS</a>';
                html += '</div>';
                html += '</div>';
            }
            html += '</div>';
            container.innerHTML = html;
        }).catch(function(e) {
            container.innerHTML = '<div class="m-empty m-text-red">Error: ' + escapeHtml(e.message) + '</div>';
        });
    }

    function showInvDetail(id) {
        var el = document.getElementById('inv-detail-' + id);
        if (el) {
            el.classList.toggle('expanded');
        }
    }

    // ── Transfer flow ──

    function selectForTransfer(item) {
        selectedTransferItem = item;
        document.getElementById('transfer-item-name').textContent = item.part_name;
        document.getElementById('transfer-item-opal').textContent = item.opal_number || '--';
        document.getElementById('transfer-item-qty').textContent = item.quantity;
        document.getElementById('transfer-item-loc').textContent = item.location;
        document.getElementById('transfer-qty').value = item.quantity;
        document.getElementById('transfer-qty').max = item.quantity;

        showTransferStep(2);
    }

    function showTransferStep(step) {
        document.querySelectorAll('.m-transfer-step').forEach(function(el) {
            el.classList.remove('active');
        });
        document.getElementById('transfer-step-' + step).classList.add('active');
    }

    function resetTransfer() {
        selectedTransferItem = null;
        document.getElementById('transfer-item-search').value = '';
        document.getElementById('transfer-item-results').innerHTML = '';
        document.getElementById('transfer-qty').value = '';
        document.getElementById('transfer-location').value = '';
        showTransferStep(1);
    }

    function searchTransferItem() {
        var query = document.getElementById('transfer-item-search').value.trim();
        if (!query) return;

        var container = document.getElementById('transfer-item-results');
        container.innerHTML = '<div class="m-text-muted mono" style="font-size: 0.75rem; padding: var(--space-sm);">Searching...</div>';

        fetch('/api/inventory?page=1&page_size=10', {
            headers: getHeaders()
        }).then(function(resp) {
            if (!resp.ok) throw new Error('API error');
            return resp.json();
        }).then(function(data) {
            var items = data.items || [];
            var q = query.toLowerCase();
            var filtered = items.filter(function(item) {
                return (item.part_name && item.part_name.toLowerCase().indexOf(q) !== -1) ||
                       (item.opal_number && item.opal_number.toLowerCase().indexOf(q) !== -1) ||
                       (item.location && item.location.toLowerCase().indexOf(q) !== -1);
            });

            if (filtered.length === 0) {
                container.innerHTML = '<div class="m-text-muted mono" style="font-size: 0.75rem; padding: var(--space-sm);">No results</div>';
                return;
            }

            var html = '';
            for (var i = 0; i < filtered.length; i++) {
                var item = filtered[i];
                html += '<div class="m-list-item" onclick="selectForTransfer(' + JSON.stringify(item).replace(/"/g, '&quot;') + ')">';
                html += '<span class="m-list-title">' + escapeHtml(item.part_name) + '</span>';
                html += '<div class="m-list-sub">' + escapeHtml(item.opal_number || '--') + ' | Qty: ' + item.quantity + ' | ' + escapeHtml(item.location) + '</div>';
                html += '</div>';
            }
            container.innerHTML = html;
        }).catch(function(e) {
            container.innerHTML = '<div class="m-text-red mono" style="font-size: 0.75rem; padding: var(--space-sm);">Error: ' + escapeHtml(e.message) + '</div>';
        });
    }

    document.getElementById('transfer-item-search').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            searchTransferItem();
        }
    });

    function confirmTransfer() {
        if (!selectedTransferItem) {
            alert('No item selected');
            return;
        }

        var qty = parseFloat(document.getElementById('transfer-qty').value);
        var location = document.getElementById('transfer-location').value.trim();

        if (!qty || qty <= 0) {
            alert('Enter a valid quantity');
            return;
        }
        if (!location) {
            alert('Enter a target location');
            return;
        }
        if (qty > parseFloat(selectedTransferItem.quantity)) {
            alert('Transfer quantity exceeds available (' + selectedTransferItem.quantity + ')');
            return;
        }

        fetch('/api/inventory/transfer', {
            method: 'POST',
            headers: getHeaders(),
            body: JSON.stringify({
                source_inventory_id: selectedTransferItem.id,
                target_location: location,
                quantity: qty
            })
        }).then(function(resp) {
            if (!resp.ok) {
                return resp.json().then(function(err) {
                    alert('Transfer failed: ' + (typeof err.detail === 'string' ? err.detail : JSON.stringify(err.detail)));
                });
            }
            return resp.json().then(function(result) {
                document.getElementById('transfer-summary').textContent =
                    qty + ' x ' + selectedTransferItem.part_name + ' moved to ' + location;
                showTransferStep(3);
            });
        }).catch(function(e) {
            alert('Network error: ' + e.message);
        });
    }

    // ── Transfer scanner ──

    function openTransferScanner() {
        var container = document.getElementById('transfer-scanner-container');
        container.classList.remove('m-hidden');

        transferScanner = new Html5Qrcode('transfer-scanner-view');
        transferScanner.start(
            { facingMode: 'environment' },
            {
                fps: 10,
                qrbox: function(w, h) {
                    var size = Math.min(w, h) * 0.7;
                    return { width: size, height: size };
                },
                aspectRatio: 1.0
            },
            function(decodedText) {
                transferScanner.stop().then(function() {
                    transferScanner = null;
                    container.classList.add('m-hidden');
                    resolveTransferScan(decodedText);
                }).catch(function() {
                    transferScanner = null;
                    container.classList.add('m-hidden');
                    resolveTransferScan(decodedText);
                });
            },
            function() {}
        ).catch(function(err) {
            container.innerHTML = '<div class="m-panel-body m-text-red mono" style="font-size: 0.8rem;">Camera error: ' + err + '</div>';
        });
    }

    function closeTransferScanner() {
        if (transferScanner) {
            transferScanner.stop().catch(function() {});
            transferScanner = null;
        }
        document.getElementById('transfer-scanner-container').classList.add('m-hidden');
    }

    function resolveTransferScan(code) {
        fetch('/api/scan/' + encodeURIComponent(code), {
            headers: getHeaders()
        }).then(function(resp) {
            if (!resp.ok) {
                alert('Code not recognized: ' + code);
                return;
            }
            return resp.json();
        }).then(function(result) {
            if (!result) return;
            if (result.type !== 'inventory' || !result.found || !result.id) {
                alert('Scanned code is not an inventory item');
                return;
            }
            // Fetch inventory detail
            fetch('/api/inventory/' + result.id, {
                headers: getHeaders()
            }).then(function(r) { return r.json(); })
            .then(function(item) {
                selectForTransfer(item);
            });
        }).catch(function(e) {
            alert('Scan error: ' + e.message);
        });
    }

    // ── Location scanner ──

    function openLocationScanner() {
        var container = document.getElementById('location-scanner-container');
        container.classList.remove('m-hidden');

        locationScanner = new Html5Qrcode('location-scanner-view');
        locationScanner.start(
            { facingMode: 'environment' },
            {
                fps: 10,
                qrbox: function(w, h) {
                    var size = Math.min(w, h) * 0.7;
                    return { width: size, height: size };
                },
                aspectRatio: 1.0
            },
            function(decodedText) {
                locationScanner.stop().then(function() {
                    locationScanner = null;
                    container.classList.add('m-hidden');
                    resolveLocationScan(decodedText);
                }).catch(function() {
                    locationScanner = null;
                    container.classList.add('m-hidden');
                    resolveLocationScan(decodedText);
                });
            },
            function() {}
        ).catch(function(err) {
            container.innerHTML = '<div class="m-panel-body m-text-red mono" style="font-size: 0.8rem;">Camera error: ' + err + '</div>';
        });
    }

    function closeLocationScanner() {
        if (locationScanner) {
            locationScanner.stop().catch(function() {});
            locationScanner = null;
        }
        document.getElementById('location-scanner-container').classList.add('m-hidden');
    }

    function resolveLocationScan(code) {
        fetch('/api/scan/' + encodeURIComponent(code), {
            headers: getHeaders()
        }).then(function(resp) {
            if (!resp.ok) {
                // Use raw code as location
                document.getElementById('transfer-location').value = code;
                return;
            }
            return resp.json();
        }).then(function(result) {
            if (!result) return;
            if (result.type === 'location' && result.found) {
                document.getElementById('transfer-location').value = result.sublabel || result.label;
            } else {
                document.getElementById('transfer-location').value = code;
            }
        }).catch(function() {
            document.getElementById('transfer-location').value = code;
        });
    }

    // ── Util ──

    function escapeHtml(str) {
        if (!str) return '';
        var div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }
</script>
{% endblock %}
