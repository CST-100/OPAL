<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Label - {{ part_number or name }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #fff;
            color: #000;
        }
        .label {
            border: 2px solid #000;
            padding: 12px;
            display: flex;
            gap: 14px;
            align-items: flex-start;
        }
        .label-qr img {
            width: 120px;
            height: 120px;
            display: block;
        }
        .label-info {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .label-pn {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 0.04em;
        }
        .label-name {
            font-size: 0.85rem;
            font-weight: 400;
        }
        .label-opal {
            font-size: 0.95rem;
            font-weight: 600;
            margin-top: 2px;
        }
        .label-detail {
            font-size: 0.75rem;
            color: #555;
        }
        @media print {
            body { min-height: auto; }
            .label { border: 2px solid #000; }
            @page { margin: 0.25in; size: 4in 2in; }
        }
    </style>
</head>
<body>
    <div class="label">
        <div class="label-qr">
            <img src="/api/{{ entity_type }}/{{ entity_id }}/qrcode" alt="QR">
        </div>
        <div class="label-info">
            {% if part_number %}
            <div class="label-pn">{{ part_number }}</div>
            {% endif %}
            <div class="label-name">{{ name }}</div>
            {% if opal_number %}
            <div class="label-opal">{{ opal_number }}</div>
            {% endif %}
            {% if lot_number %}
            <div class="label-detail">LOT: {{ lot_number }}</div>
            {% endif %}
            {% if location %}
            <div class="label-detail">{{ location }}</div>
            {% endif %}
        </div>
    </div>
    <script>window.print();</script>
</body>
</html>
