{% extends "layouts/base.html" %}

{% block breadcrumbs %}
<span class="breadcrumb-item">HOME</span>
<span class="breadcrumb-item">PROCEDURES</span>
{% endblock %}

{% block content %}
<div class="panel">
    <div class="panel-header">
        PROCEDURES
        <button class="btn btn-primary" style="float: right;">+ NEW PROCEDURE</button>
    </div>
    <div class="panel-body">
        <table class="data-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>NAME</th>
                    <th>STATUS</th>
                    <th>VERSION</th>
                    <th>STEPS</th>
                    <th>CREATED</th>
                    <th>UPDATED</th>
                </tr>
            </thead>
            <tbody id="procedures-table-body">
                <tr>
                    <td colspan="7" class="empty-state">
                        <p class="text-muted">No procedures yet</p>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
