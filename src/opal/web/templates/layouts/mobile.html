<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ title | default("OPAL Mobile") }}</title>
    <script>
        (function() {
            var theme = localStorage.getItem('opal_theme') || 'dark';
            if (theme === 'light') document.documentElement.setAttribute('data-theme', 'light');
        })();
    </script>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/css/mobile.css">
    {% block head %}{% endblock %}
</head>
<body class="mobile-layout">
    <header class="mobile-header">
        <a href="/m/" class="brand-link">OPAL &beta;</a>
        <span class="header-user mono" id="m-user-name">---</span>
    </header>

    <div class="mobile-content">
        {% block content %}{% endblock %}
    </div>

    <nav class="mobile-tabbar">
        <a href="/m/" class="{% if request.url.path == '/m/' or request.url.path == '/m' %}active{% endif %}">
            <span class="tab-icon">&#9783;</span>
            SCAN
        </a>
        <a href="/m/exec" class="{% if request.url.path.startswith('/m/exec') %}active{% endif %}">
            <span class="tab-icon">&#9654;</span>
            EXEC
        </a>
        <a href="/m/inventory" class="{% if request.url.path.startswith('/m/inventory') %}active{% endif %}">
            <span class="tab-icon">&#9638;</span>
            STOCK
        </a>
        <a href="/m/more" class="{% if request.url.path.startswith('/m/more') %}active{% endif %}">
            <span class="tab-icon">&#8943;</span>
            MORE
        </a>
    </nav>

    <script>
        function getCookie(name) {
            var match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
            if (!match) return null;
            var val = decodeURIComponent(match[2]);
            if (val.length >= 2 && val[0] === '"' && val[val.length - 1] === '"') val = val.slice(1, -1);
            return val;
        }

        var userId = getCookie('opal_user_id') || localStorage.getItem('opal_user_id') || '';
        var userName = getCookie('opal_user_name') || localStorage.getItem('opal_user_name') || '';

        if (!userId && window.location.pathname !== '/m/login') {
            window.location.href = '/m/login';
        }

        var userEl = document.getElementById('m-user-name');
        if (userEl && userName) userEl.textContent = userName;

        function getHeaders() {
            return { 'Content-Type': 'application/json', 'X-User-Id': userId };
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
