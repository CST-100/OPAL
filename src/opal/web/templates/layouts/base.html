<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <script src="/static/js/htmx.min.js"></script>
    <script src="/static/js/marked.min.js"></script>
    <script src="/static/js/events.js"></script>
</head>
<body>
    <header class="header">
        <div class="header-brand">
            <a href="/" class="brand-link">OPAL</a>
            <span class="brand-version">{{ app_version }}</span>
        </div>
        <nav class="header-nav">
            <!-- Inventory dropdown -->
            <div class="nav-dropdown">
                <button class="nav-dropdown-btn{% if request.url.path.startswith('/parts') or request.url.path.startswith('/inventory') or request.url.path.startswith('/purchases') or request.url.path.startswith('/suppliers') %} active{% endif %}">
                    INVENTORY
                </button>
                <div class="nav-dropdown-content">
                    <a href="/parts" class="{% if request.url.path.startswith('/parts') %}active{% endif %}">Parts</a>
                    <a href="/inventory" class="{% if request.url.path.startswith('/inventory') %}active{% endif %}">Stock Levels</a>
                    <a href="/purchases" class="{% if request.url.path.startswith('/purchases') %}active{% endif %}">Purchases</a>
                    <a href="/suppliers" class="{% if request.url.path.startswith('/suppliers') %}active{% endif %}">Suppliers</a>
                </div>
            </div>

            <!-- Manufacturing dropdown -->
            <div class="nav-dropdown">
                <button class="nav-dropdown-btn{% if request.url.path.startswith('/procedures') or request.url.path.startswith('/executions') or request.url.path.startswith('/workcenters') %} active{% endif %}">
                    MANUFACTURING
                </button>
                <div class="nav-dropdown-content">
                    <a href="/procedures" class="{% if request.url.path.startswith('/procedures') %}active{% endif %}">Procedures</a>
                    <a href="/executions" class="{% if request.url.path.startswith('/executions') %}active{% endif %}">Executions</a>
                    <a href="/workcenters" class="{% if request.url.path.startswith('/workcenters') %}active{% endif %}">Workcenters</a>
                </div>
            </div>

            <!-- Quality dropdown -->
            <div class="nav-dropdown">
                <button class="nav-dropdown-btn{% if request.url.path.startswith('/issues') or request.url.path.startswith('/risks') or request.url.path.startswith('/datasets') %} active{% endif %}">
                    QUALITY
                </button>
                <div class="nav-dropdown-content">
                    <a href="/issues" class="{% if request.url.path.startswith('/issues') %}active{% endif %}">Issues</a>
                    <a href="/risks" class="{% if request.url.path.startswith('/risks') %}active{% endif %}">Risks</a>
                    <a href="/datasets" class="{% if request.url.path.startswith('/datasets') %}active{% endif %}">Datasets</a>
                </div>
            </div>
        </nav>

        <div class="header-right">
            <!-- Command palette trigger -->
            <button class="nav-cmd-btn" onclick="openCommandPalette()" title="Command Palette (Ctrl+K)">
                <span class="cmd-icon">&#8984;</span>K
            </button>

            <!-- Project link -->
            <a href="/project/edit" class="header-link{% if request.url.path.startswith('/project') %} active{% endif %}" title="Project Settings">PROJECT</a>

            <div class="user-dropdown">
            <button class="user-dropdown-btn" id="user-btn" onclick="toggleUserDropdown()">
                <span id="user-display">Lavie Ohana</span>
                <span>▼</span>
            </button>
            <div class="user-dropdown-content" id="user-dropdown-content">
                <div class="user-dropdown-header">
                    <div class="user-profile-section">
                        <div class="user-avatar" id="user-avatar">
                            <span id="user-initials">LO</span>
                        </div>
                        <div class="user-name-display">
                            <div class="user-fullname" id="user-fullname">Lavie Ohana</div>
                            <div class="user-username" id="user-username">lohana</div>
                        </div>
                    </div>
                    <div class="user-header-actions">
                        <button class="icon-btn" title="Profile" onclick="openProfile(event)">
                            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                                <path d="M8 8a3 3 0 100-6 3 3 0 000 6zM8 9c-2.67 0-8 1.34-8 4v1h16v-1c0-2.66-5.33-4-8-4z"/>
                            </svg>
                        </button>
                        <button class="icon-btn" title="Settings" onclick="openSettings(event)">
                            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                                <path d="M8 10.5a2.5 2.5 0 100-5 2.5 2.5 0 000 5z"/>
                                <path d="M14 7h-1.5c-.1-.4-.3-.8-.5-1.2l1.1-1.1-.7-.7-1.1 1.1c-.4-.2-.8-.4-1.2-.5V3h-1v1.5c-.4.1-.8.3-1.2.5L6.7 3.9l-.7.7L7.1 5.7c-.2.4-.4.8-.5 1.2H5v1h1.5c.1.4.3.8.5 1.2L5.9 10.2l.7.7 1.1-1.1c.4.2.8.4 1.2.5V12h1v-1.5c.4-.1.8-.3 1.2-.5l1.1 1.1.7-.7-1.1-1.1c.2-.4.4-.8.5-1.2H14V7z"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <hr class="user-dropdown-divider">

                <button class="user-signout-btn" onclick="clearUser()">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                        <path d="M6 14H3V2h3V0H3C1.9 0 1 .9 1 2v12c0 1.1.9 2 2 2h3v-2zm7.7-6.7L11 4.6l-1.4 1.4 1.3 1.3H5v2h5.9l-1.3 1.3L11 12.3l2.7-2.7c.4-.4.4-1 0-1.4z"/>
                    </svg>
                    Sign Out
                </button>
            </div>
        </div>
    </header>

    <div class="breadcrumbs">
        {% block breadcrumbs %}
        <span class="breadcrumb-item">HOME</span>
        {% endblock %}
    </div>

    <main class="main">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <span class="footer-status">STATUS: READY</span>
        <span class="footer-time" id="current-time"></span>
    </footer>

    <!-- Command Palette Modal -->
    <div id="command-palette" class="cmd-palette" style="display: none;">
        <div class="cmd-palette-backdrop" onclick="closeCommandPalette()"></div>
        <div class="cmd-palette-dialog">
            <input type="text"
                   id="cmd-input"
                   class="cmd-input"
                   placeholder="Type a command or search..."
                   autocomplete="off"
                   oninput="filterCommands(this.value)">
            <div id="cmd-results" class="cmd-results"></div>
            <div class="cmd-footer">
                <span><kbd>↑↓</kbd> navigate</span>
                <span><kbd>Enter</kbd> select</span>
                <span><kbd>Esc</kbd> close</span>
            </div>
        </div>
    </div>

    <script>
        // Command palette data
        const commands = [
            // Navigation
            { type: 'nav', label: 'Go to Parts', action: '/parts', keywords: 'parts inventory components' },
            { type: 'nav', label: 'Go to Stock Levels', action: '/inventory', keywords: 'inventory stock quantities' },
            { type: 'nav', label: 'Go to Purchases', action: '/purchases', keywords: 'purchases orders po' },
            { type: 'nav', label: 'Go to Suppliers', action: '/suppliers', keywords: 'suppliers vendors' },
            { type: 'nav', label: 'Go to Procedures', action: '/procedures', keywords: 'procedures ops manufacturing' },
            { type: 'nav', label: 'Go to Executions', action: '/executions', keywords: 'executions runs instances' },
            { type: 'nav', label: 'Go to Workcenters', action: '/workcenters', keywords: 'workcenters stations' },
            { type: 'nav', label: 'Go to Issues', action: '/issues', keywords: 'issues bugs problems nc' },
            { type: 'nav', label: 'Go to Risks', action: '/risks', keywords: 'risks hazards mitigation' },
            { type: 'nav', label: 'Go to Datasets', action: '/datasets', keywords: 'datasets charts graphs data' },
            { type: 'nav', label: 'Go to Home', action: '/', keywords: 'home dashboard' },
            // Actions
            { type: 'action', label: 'New Part', action: '/parts/new', keywords: 'create add part' },
            { type: 'action', label: 'New Purchase Order', action: '/purchases/new', keywords: 'create add purchase po' },
            { type: 'action', label: 'New Supplier', action: '/suppliers/new', keywords: 'create add supplier vendor' },
            { type: 'action', label: 'New Procedure', action: '/procedures/new', keywords: 'create add procedure op' },
            { type: 'action', label: 'New Execution', action: '/executions/new', keywords: 'start run execute procedure' },
            { type: 'action', label: 'New Workcenter', action: '/workcenters/new', keywords: 'create add workcenter station' },
            { type: 'action', label: 'New Issue', action: '/issues/new', keywords: 'create add issue bug nc' },
            { type: 'action', label: 'New Risk', action: '/risks/new', keywords: 'create add risk hazard' },
            { type: 'action', label: 'New Dataset', action: '/datasets/new', keywords: 'create add dataset chart' },
        ];

        let selectedIndex = 0;
        let filteredCommands = [...commands];

        function openCommandPalette() {
            document.getElementById('command-palette').style.display = 'flex';
            const input = document.getElementById('cmd-input');
            input.value = '';
            input.focus();
            filteredCommands = [...commands];
            selectedIndex = 0;
            renderCommands();
        }

        function closeCommandPalette() {
            document.getElementById('command-palette').style.display = 'none';
        }

        function filterCommands(query) {
            query = query.toLowerCase().trim();
            if (!query) {
                filteredCommands = [...commands];
            } else {
                filteredCommands = commands.filter(cmd => {
                    const searchText = (cmd.label + ' ' + cmd.keywords).toLowerCase();
                    return query.split(' ').every(term => searchText.includes(term));
                });
            }
            selectedIndex = 0;
            renderCommands();
        }

        function renderCommands() {
            const container = document.getElementById('cmd-results');
            if (filteredCommands.length === 0) {
                container.innerHTML = '<div class="cmd-empty">No matches found</div>';
                return;
            }

            container.innerHTML = filteredCommands.map((cmd, i) => `
                <div class="cmd-item ${i === selectedIndex ? 'selected' : ''}"
                     onclick="executeCommand(${i})"
                     onmouseenter="selectedIndex = ${i}; renderCommands();">
                    <span class="cmd-type cmd-type-${cmd.type}">${cmd.type === 'nav' ? 'GO' : 'NEW'}</span>
                    <span class="cmd-label">${cmd.label}</span>
                </div>
            `).join('');
        }

        function executeCommand(index) {
            const cmd = filteredCommands[index];
            if (cmd) {
                window.location.href = cmd.action;
            }
        }

        // Keyboard navigation for command palette
        document.getElementById('cmd-input').addEventListener('keydown', function(e) {
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                selectedIndex = Math.min(selectedIndex + 1, filteredCommands.length - 1);
                renderCommands();
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                selectedIndex = Math.max(selectedIndex - 1, 0);
                renderCommands();
            } else if (e.key === 'Enter') {
                e.preventDefault();
                executeCommand(selectedIndex);
            } else if (e.key === 'Escape') {
                closeCommandPalette();
            }
        });

        // User dropdown toggle
        function toggleUserDropdown() {
            const dropdown = document.getElementById('user-dropdown-content');
            const isVisible = dropdown.style.display === 'block';
            dropdown.style.display = isVisible ? 'none' : 'block';
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', function(event) {
            const userDropdown = document.querySelector('.user-dropdown');
            const userDropdownContent = document.getElementById('user-dropdown-content');
            if (userDropdown && !userDropdown.contains(event.target)) {
                userDropdownContent.style.display = 'none';
            }
        });

        // User selection
        function setUser(userId, userName, userEmail) {
            localStorage.setItem('opal_user_id', userId);
            localStorage.setItem('opal_user_name', userName);
            localStorage.setItem('opal_user_email', userEmail || '');
            updateUserDisplay(userName, userEmail);
        }

        function clearUser() {
            localStorage.removeItem('opal_user_id');
            localStorage.removeItem('opal_user_name');
            localStorage.removeItem('opal_user_email');
            document.getElementById('user-display').textContent = 'NO USER';
            document.getElementById('user-fullname').textContent = 'No User Selected';
            document.getElementById('user-username').textContent = 'Select a user below';
            document.getElementById('user-initials').textContent = '?';

            // Close the dropdown after signing out
            document.getElementById('user-dropdown-content').style.display = 'none';
        }

        function updateUserDisplay(userName, userEmail) {
            // Update button display
            document.getElementById('user-display').textContent = userName;

            // Update dropdown header
            document.getElementById('user-fullname').textContent = userName;
            document.getElementById('user-username').textContent = userEmail || 'No email';

            // Update initials
            const initials = userName.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
            document.getElementById('user-initials').textContent = initials;
        }

        function openProfile(event) {
            event.stopPropagation();
            const userId = localStorage.getItem('opal_user_id');
            if (userId) {
                window.location.href = '/users/' + userId;
            }
        }

        function openSettings(event) {
            event.stopPropagation();
            window.location.href = '/settings';
        }

        // Restore user selection
        document.addEventListener('DOMContentLoaded', function() {
            const userId = localStorage.getItem('opal_user_id');
            const userName = localStorage.getItem('opal_user_name');
            const userEmail = localStorage.getItem('opal_user_email');
            if (userId && userName) {
                updateUserDisplay(userName, userEmail);
            }
        });

        // Add user header to all HTMX requests
        document.body.addEventListener('htmx:configRequest', function(event) {
            const userId = localStorage.getItem('opal_user_id');
            if (userId) {
                event.detail.headers['X-User-Id'] = userId;
            }
        });

        // Update time display
        function updateTime() {
            const now = new Date();
            const iso = now.toISOString().replace('T', ' ').substring(0, 19);
            document.getElementById('current-time').textContent = iso + 'Z';
        }
        updateTime();
        setInterval(updateTime, 1000);

        // Global keyboard shortcuts
        document.addEventListener('keydown', function(event) {
            // Command palette: Ctrl+K or Cmd+K
            if ((event.ctrlKey || event.metaKey) && event.key === 'k') {
                event.preventDefault();
                openCommandPalette();
                return;
            }

            // Escape closes command palette
            if (event.key === 'Escape') {
                closeCommandPalette();
                return;
            }

            // Alt+key shortcuts still work
            if (!event.altKey) return;
            const shortcuts = {
                'h': '/',
                'p': '/parts',
                'r': '/procedures',
                'e': '/executions',
                'i': '/issues',
                'k': '/risks',
                'd': '/datasets',
                'n': '/inventory',
                'u': '/purchases',
                's': '/suppliers',
                'w': '/workcenters',
            };
            if (shortcuts[event.key]) {
                event.preventDefault();
                window.location.href = shortcuts[event.key];
            }
        });

        // Markdown rendering helper
        function renderMarkdown() {
            document.querySelectorAll('[data-markdown]').forEach(el => {
                const raw = el.textContent;
                el.innerHTML = marked.parse(raw);
                el.classList.add('markdown-content');
                el.removeAttribute('data-markdown');
            });
        }

        // Render markdown on page load
        document.addEventListener('DOMContentLoaded', renderMarkdown);

        // Re-render after HTMX swaps
        document.body.addEventListener('htmx:afterSwap', renderMarkdown);
    </script>
</body>
</html>
