{% extends "layouts/base.html" %}

{% block breadcrumbs %}
<span class="breadcrumb-item">HOME</span>
<span class="breadcrumb-item"><a href="/users">USERS</a></span>
<span class="breadcrumb-item"><a href="/users/{{ user.id }}">{{ user.name }}</a></span>
<span class="breadcrumb-item">EDIT</span>
{% endblock %}

{% block content %}
<div class="panel" style="max-width: 600px;">
    <div class="panel-header">EDIT USER #{{ user.id }}</div>
    <div class="panel-body">
        <form id="user-form" onsubmit="updateUser(event)">
            <div class="form-group">
                <label class="form-label" for="name">NAME *</label>
                <input type="text" id="name" name="name" class="form-input" required maxlength="255" value="{{ user.name }}">
            </div>

            <div class="form-group">
                <label class="form-label" for="email">EMAIL</label>
                <input type="email" id="email" name="email" class="form-input" maxlength="255" value="{{ user.email or '' }}">
                <small class="text-muted">Optional - for contact purposes</small>
            </div>

            <div class="form-group">
                <label class="form-checkbox">
                    <input type="checkbox" id="is_active" name="is_active" {{ 'checked' if user.is_active else '' }}>
                    Active
                </label>
                <small class="text-muted">Inactive users cannot be selected for tracking</small>
            </div>

            <div id="form-error" class="text-red" style="margin-bottom: var(--space-md); display: none;"></div>

            <div style="display: flex; gap: var(--space-md); justify-content: flex-end;">
                <a href="/users/{{ user.id }}" class="btn">CANCEL</a>
                <button type="submit" class="btn btn-primary">SAVE CHANGES</button>
            </div>
        </form>
    </div>
</div>

<script>
async function updateUser(event) {
    event.preventDefault();

    const form = document.getElementById('user-form');
    const errorDiv = document.getElementById('form-error');
    errorDiv.style.display = 'none';

    const data = {
        name: form.name.value,
        email: form.email.value || null,
        is_active: form.is_active.checked,
    };

    const headers = {
        'Content-Type': 'application/json',
    };

    const userId = localStorage.getItem('opal_user_id');
    if (userId) {
        headers['X-User-Id'] = userId;
    }

    try {
        const response = await fetch('/api/users/{{ user.id }}', {
            method: 'PATCH',
            headers: headers,
            body: JSON.stringify(data),
        });

        if (response.ok) {
            window.location.href = '/users/{{ user.id }}';
        } else {
            const error = await response.json();
            errorDiv.textContent = error.detail || 'Failed to update user';
            errorDiv.style.display = 'block';
        }
    } catch (e) {
        errorDiv.textContent = 'Network error: ' + e.message;
        errorDiv.style.display = 'block';
    }
}
</script>
{% endblock %}
